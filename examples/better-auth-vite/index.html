        <script id="file-app-jsx" type="text/plain">import React, { useState } from 'react';
import { createAuthClient } from 'better-auth/react';

const authClient = createAuthClient();

export default function App() {
  const { data: session, isPending, refetch } = authClient.useSession();
  const [email, setEmail] = useState('demo@nodepod.local');
  const [password, setPassword] = useState('demo-password-123');
  const [name, setName] = useState('Demo User');
  const [message, setMessage] = useState('');
  const [busy, setBusy] = useState(false);

  async function run(action) {
    setBusy(true);
    setMessage('');
    try {
      if (action === 'signup') {
        const { error } = await authClient.signUp.email({ email, password, name });
        if (error) throw new Error(error.message || 'Sign up failed');
        setMessage('Signed up — session should appear below.');
      } else if (action === 'signin') {
        const { error } = await authClient.signIn.email({ email, password });
        if (error) throw new Error(error.message || 'Sign in failed');
        setMessage('Signed in.');
      } else if (action === 'signout') {
        await authClient.signOut();
        setMessage('Signed out.');
      }
      await refetch();
    } catch (err) {
      setMessage(err.message || String(err));
    } finally {
      setBusy(false);
    }
  }

  return React.createElement(
    'div',
    {
      style: {
        fontFamily: 'system-ui, sans-serif',
        maxWidth: 520,
        margin: '2rem auto',
        padding: '0 1rem',
        color: '#0f172a',
      },
    },
    React.createElement('h1', { style: { marginBottom: 8 } }, 'Better Auth + node:sqlite'),
    React.createElement(
      'p',
      { style: { color: '#475569', marginBottom: 20, lineHeight: 1.5 } },
      'Running inside Nodepod. The auth API uses ',
      React.createElement('code', null, 'DatabaseSync'),
      ' from ',
      React.createElement('code', null, 'node:sqlite'),
      ' (wa-sqlite WASM). Auth routes are served by the same Vite process — no cross-port proxy.',
    ),
    React.createElement(
      'label',
      { style: { display: 'block', marginBottom: 8 } },
      'Name',
      React.createElement('input', {
        value: name,
        onChange: (e) => setName(e.target.value),
        style: inputStyle,
        disabled: busy,
      }),
    ),
    React.createElement(
      'label',
      { style: { display: 'block', marginBottom: 8 } },
      'Email',
      React.createElement('input', {
        value: email,
        onChange: (e) => setEmail(e.target.value),
        style: inputStyle,
        disabled: busy,
      }),
    ),
    React.createElement(
      'label',
      { style: { display: 'block', marginBottom: 16 } },
      'Password',
      React.createElement('input', {
        type: 'password',
        value: password,
        onChange: (e) => setPassword(e.target.value),
        style: inputStyle,
        disabled: busy,
      }),
    ),
    React.createElement(
      'div',
      { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 } },
      React.createElement('button', { onClick: () => run('signup'), disabled: busy, style: btnStyle }, 'Sign up'),
      React.createElement('button', { onClick: () => run('signin'), disabled: busy, style: btnStyle }, 'Sign in'),
      React.createElement('button', { onClick: () => run('signout'), disabled: busy || !session, style: btnStyle }, 'Sign out'),
    ),
    message
      ? React.createElement('p', { style: { marginBottom: 12, color: '#0369a1' } }, message)
      : null,
    React.createElement(
      'div',
      {
        style: {
          background: '#f8fafc',
          border: '1px solid #e2e8f0',
          borderRadius: 8,
          padding: 12,
          fontSize: 14,
        },
      },
      React.createElement('strong', null, 'Session'),
      isPending
        ? React.createElement('p', { style: { marginTop: 8 } }, 'Loading…')
        : session
          ? React.createElement(
              'pre',
              { style: { marginTop: 8, overflow: 'auto', fontSize: 12 } },
              JSON.stringify(session, null, 2),
            )
          : React.createElement('p', { style: { marginTop: 8, color: '#64748b' } }, 'Not signed in'),
    ),
  );
}

const inputStyle = {
  display: 'block',
  width: '100%',
  marginTop: 4,
  padding: '8px 10px',
  borderRadius: 6,
  border: '1px solid #cbd5e1',
  fontSize: 14,
};

const btnStyle = {
  padding: '8px 14px',
  borderRadius: 6,
  border: '1px solid #0ea5e9',
  background: '#0ea5e9',
  color: '#fff',
  cursor: 'pointer',
  fontWeight: 600,
};
</script>

        <script id="file-auth-plugin" type="text/plain">import fs from 'node:fs';
import { DatabaseSync, preloadSqlite } from 'node:sqlite';
import { betterAuth } from 'better-auth';
import { toNodeHandler } from 'better-auth/node';
import { getMigrations } from 'better-auth/db/migration';

let ready;

async function initAuth() {
  if (ready) return ready;
  ready = (async () => {
    if (!(await preloadSqlite())) {
      throw new Error('Failed to load wa-sqlite WASM');
    }
    const dataDir = '/project/data';
    if (!fs.existsSync(dataDir)) {
      fs.mkdirSync(dataDir, { recursive: true });
    }
    const db = new DatabaseSync(`${dataDir}/auth.db`);
    const auth = betterAuth({
      secret: process.env.BETTER_AUTH_SECRET || 'nodepod-demo-secret-not-for-production',
      database: db,
      emailAndPassword: { enabled: true },
      baseURL: 'http://localhost:5173',
      trustedOrigins: ['http://localhost:5173'],
    });
    const { runMigrations } = await getMigrations(auth.options);
    await runMigrations();
    console.log('[better-auth] schema ready (node:sqlite / wa-sqlite)');
    return toNodeHandler(auth);
  })();
  return ready;
}

export function betterAuthPlugin() {
  return {
    name: 'nodepod-better-auth',
    enforce: 'pre',
    async configureServer(server) {
      // Init during server setup — not per-request. Async route middleware
      // (await initAuth()) yields before toNodeHandler runs, so the body
      // stream can end with no reader → "expected object, received undefined".
      const handler = await initAuth();
      server.middlewares.use((req, res, next) => {
        if (!req.url || !req.url.startsWith('/api/auth')) {
          return next();
        }
        return handler(req, res);
      });
    },
  };
}
</script>

        <script type="module">
            import { Nodepod } from "/dist/index.mjs";

            const out = document.getElementById("output");
            const preview = document.getElementById("preview");
            const statusEl = document.getElementById("status");
            const runBtn = document.getElementById("run");
            const clearBtn = document.getElementById("clear");

            function log(text, cls = "stdout") {
                const span = document.createElement("span");
                span.className = cls;
                span.textContent = text + "\n";
                out.appendChild(span);
                out.scrollTop = out.scrollHeight;
            }

            function readFile(id) {
                return document
                    .getElementById(id)
                    .textContent.replace(/<\\\/script>/g, "<" + "/script>");
            }

            function setStatus(text) {
                statusEl.textContent = text;
            }

            clearBtn.addEventListener("click", () => {
                out.textContent = "";
            });

            async function runCommand(pod, command, args = []) {
                const proc = await pod.spawn(command, args, { cwd: pod.cwd });
                proc.on("output", (t) => log(t.trimEnd()));
                proc.on("error", (t) => log(t.trimEnd(), "stderr"));
                return proc;
            }

            runBtn.addEventListener("click", async () => {
                runBtn.disabled = true;
                preview.removeAttribute("src");
                setStatus("Booting…");

                try {
                    let viteUrl = null;
                    let resolveVite;
                    const viteReady = new Promise((r) => {
                        resolveVite = r;
                    });

                    log("Booting nodepod (workdir=/project)…", "info");
                    const pod = await Nodepod.boot({
                        workdir: "/project",
                        onServerReady: (port, url) => {
                            log(`Server ready: port=${port} ${url}`, "info");
                            if (port === 5173) {
                                viteUrl = url;
                                resolveVite(url);
                            }
                        },
                    });
                    log("Booted.\n", "pass");

                    const files = {
                        "/project/package.json": readFile("file-package-json"),
                        "/project/vite.config.js": readFile("file-vite-config"),
                        "/project/index.html": readFile("file-index-html"),
                        "/project/src/main.jsx": readFile("file-main-jsx"),
                        "/project/src/App.jsx": readFile("file-app-jsx"),
                        "/project/server/auth-plugin.mjs": readFile("file-auth-plugin"),
                    };
                    for (const [path, content] of Object.entries(files)) {
                        await pod.fs.writeFile(path, content);
                    }
                    log("Project files written.\n", "info");

                    log("--- npm install ---", "dim");
                    setStatus("Installing dependencies…");
                    const install = await runCommand(pod, "npm", ["install"]);
                    const installRes = await install.completion;
                    if (installRes.exitCode !== 0) {
                        log(`npm install failed (exit=${installRes.exitCode})`, "fail");
                        setStatus("Install failed");
                        return;
                    }
                    log("npm install done.\n", "pass");

                    log("--- Vite dev (auth middleware on /api/auth) ---", "dim");
                    setStatus("Starting Vite…");
                    const devProc = await runCommand(pod, "npm", ["run", "dev"]);

                    const raced = await Promise.race([
                        viteReady,
                        devProc.completion.then((res) => ({ __exit: res.exitCode })),
                        new Promise((r) => setTimeout(() => r({ __timeout: true }), 120000)),
                    ]);

                    if (raced?.__exit != null) {
                        log(`Vite exited early (code=${raced.__exit})`, "fail");
                        setStatus("Vite failed");
                        return;
                    }
                    if (raced?.__timeout) {
                        log("Timed out waiting for Vite on port 5173", "fail");
                        setStatus("Timeout");
                        devProc.kill();
                        return;
                    }

                    log(`\nVite ready: ${viteUrl}`, "pass");
                    setStatus(`Live — ${viteUrl}`);
                    preview.src = viteUrl;
                    log("\nTry Sign up in the preview. Session JSON should appear after auth.", "info");
                } catch (err) {
                    log(String(err?.stack || err), "fail");
                    setStatus("Error — see log");
                } finally {
                    runBtn.disabled = false;
                }
            });
        </script>
    </body>
